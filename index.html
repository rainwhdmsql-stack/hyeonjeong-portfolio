<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>조현정 | Portfolio</title>

    <!-- 기본 메타 -->

    <meta
      name="description"
      content="UX/UI Designer 조현정의 포트폴리오입니다. UX/UI Design, Web Publishing, Design Works 프로젝트를 확인해보세요."
    />

    <meta
      name="keywords"
      content="조현정, UX/UI Designer, UI Designer, UX Designer, Portfolio, Web Publishing, Front-end, Figma"
    />

    <meta name="author" content="조현정" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="조현정 | UX/UI Designer Portfolio" />

    <meta
      property="og:description"
      content="사용자 경험을 설계하고, 인터페이스를 구현하는 UX/UI 디자이너 조현정의 포트폴리오입니다."
    />

    <meta
      property="og:url"
      content="https://hyeonjeong-portfolio.vercel.app/"
    />

    <meta
      property="og:image"
      content="https://hyeonjeong-portfolio.vercel.app/asset/portfolio-thumbnail.png"
    />

    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta property="og:site_name" content="조현정 Portfolio" />
    <meta property="og:locale" content="ko_KR" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:title" content="조현정 | UX/UI Designer Portfolio" />

    <meta
      name="twitter:description"
      content="UX/UI Design · Web Publishing · Design Works"
    />

    <meta
      name="twitter:image"
      content="https://hyeonjeong-portfolio.vercel.app/asset/portfolio-thumbnail.png"
    />

    <!-- favicon -->
    <link
      rel="icon"
      type="image/png"
      href="asset/favicon/favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="asset/favicon/favicon.svg" />
    <link rel="shortcut icon" href="asset/favicon/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="asset/favicon/apple-touch-icon.png"
    />
    <link rel="manifest" href="asset/favicon/site.webmanifest" />

    <!-- CSS 연결 -->
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <main id="page">
      <header class="hero__header" aria-label="포트폴리오 상단 정보">
        <p
          class="hero__brand"
          data-hero-text="Hyeon Jeong | PORTFOLIO"
          data-project-text="Hyeon Jeong | PROJECTS"
        >
          Hyeon Jeong | PORTFOLIO
        </p>
        <p
          class="hero__category"
          data-hero-text="UX/UI DESIGN"
          data-project-text="SELECTED WORK"
        >
          UX/UI DESIGN
        </p>
      </header>

      <div class="hero-project" aria-label="히어로와 프로젝트 연결 영역">
        <div class="hero__bg" aria-hidden="true">
          <img
            class="blob blob--left"
            src="asset/image/blob/Union.svg"
            alt=""
          />
          <img
            class="blob blob--right"
            src="asset/image/blob/Union-1.svg"
            alt=""
          />
        </div>

        <section class="hero" aria-label="포트폴리오 인트로">
          <div class="hero__viewport">
            <div class="inner hero__inner">
              <div class="hero__character" aria-hidden="true">
                <img
                  src="asset/image/charactor_original.png"
                  alt="조현정 캐릭터"
                />
              </div>

              <div class="hero__message-wrap" aria-live="polite">
                <p class="hero__message is-active">
                  안녕하세요, <br />UX/UI 디자이너 조현정입니다.
                </p>
                <p class="hero__message">
                  사용자의 행동을 관찰하고, <br />
                  더 자연스러운 경험을 <br />설계하는 것을 좋아합니다.
                </p>
                <p class="hero__message">
                  긴 소개는 잠시 접어두고 <br />이제 제가 만든 프로젝트들을
                  보여드릴게요.
                </p>
              </div>

              <div class="hero__scroll">
                <p>스크롤 해주세요</p>
                <img src="asset/image/mouse.png" alt="스크롤 아이콘" />
              </div>
            </div>
          </div>
        </section>

        <section class="project" id="projects" aria-label="프로젝트 영역">
          <div class="inner project__inner">
            <div class="project__intro">
              <p class="project__eyebrow">PROJECTS</p>
              <h2 class="project__title">Selected Works</h2>
            </div>

            <div class="gallery" aria-label="프로젝트 슬라이더">
              <ul
                class="cards"
                id="categoryCards"
                aria-label="프로젝트 카테고리 슬라이더"
              ></ul>
              <div class="actions" aria-label="슬라이더 컨트롤">
                <button class="prev" type="button" aria-label="이전 슬라이드">
                  ❮
                </button>
                <button class="next" type="button" aria-label="다음 슬라이드">
                  ❯
                </button>
              </div>
            </div>
          </div>
        </section>
      </div>
      <section
        class="project-detail project-detail--dynamic"
        id="project-detail"
        aria-label="프로젝트 상세 영역"
      >
        <div class="inner project-detail__inner">
          <div class="detail-nav" aria-label="프로젝트 상세 탐색">
            <a
              class="detail-back"
              href="#projects"
              aria-label="프로젝트 카테고리 슬라이더로 돌아가기"
              >All Projects</a
            >
          </div>
          <div id="projectDetailMount"></div>
        </div>
      </section>
      <section class="section section--about" id="about">
        <div class="inner"><p class="section__eyebrow">ABOUT</p></div>
      </section>
      <section class="section section--contact" id="contact">
        <div class="inner"><p class="section__eyebrow">CONTACT</p></div>
      </section>
    </main>

    <!-- GSAP 라이브러리 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <!-- js 연결 -->
    <script src="js/projectData.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
