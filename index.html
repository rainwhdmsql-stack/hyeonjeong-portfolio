<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>조현정 | Portfolio</title>
  <meta name="description" content="조현정의 UX/UI 포트폴리오 웹사이트입니다." />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <main id="page">
    <!-- Hero와 Project는 하나의 흐름으로 연결되는 메인 페이지입니다. -->
    <header class="hero__header" aria-label="포트폴리오 상단 정보">
      <p class="hero__brand" data-hero-text="Hyeon Jeong | PORTFOLIO" data-project-text="Hyeon Jeong | PROJECTS">Hyeon Jeong | PORTFOLIO</p>
      <p class="hero__category" data-hero-text="UX/UI DESIGN" data-project-text="SELECTED WORK">UX/UI DESIGN</p>
    </header>

    <div class="hero-project" aria-label="히어로와 프로젝트 연결 영역">
      <div class="hero__bg" aria-hidden="true">
        <!-- Hero와 Project가 하나의 영역처럼 이어지도록 공통 배경 레이어로 분리했습니다. -->
        <img class="blob blob--left" src="asset/image/blob/Union.svg" alt="" />
        <img class="blob blob--right" src="asset/image/blob/Union-1.svg" alt="" />
      </div>

      <section class="hero" aria-label="포트폴리오 인트로">
        <div class="hero__viewport">
          <div class="inner hero__inner">
          <div class="hero__character" aria-hidden="true">
            <img src="asset/image/charactor_original.png" alt="조현정 캐릭터" />
          </div>

          <div class="hero__message-wrap" aria-live="polite">
            <p class="hero__message is-active">안녕하세요, <br>UX/UI 디자이너 조현정입니다.</p>
            <p class="hero__message">사용자의 행동을 관찰하고, <br> 더 자연스러운 경험을 <br>설계하는 것을 좋아합니다.</p>
            <p class="hero__message">긴 소개는 잠시 접어두고 <br>이제 제가 만든 프로젝트들을 보여드릴게요.</p>
          </div>

          <div class="hero__scroll">
            <p>스크롤 해주세요</p>
            <img src="asset/image/mouse.png" alt="스크롤 아이콘" />
          </div>
        </div>
        </div>
      </section>

      <section class="project" id="projects" aria-label="프로젝트 영역">
      <div class="inner project__inner">
        <div class="project__intro">
          <p class="project__eyebrow">PROJECTS</p>
          <h2 class="project__title">Selected Works</h2>
        </div>

        <!-- 슬라이더는 전달받은 형태/비율/기능을 유지하고, 컬러/텍스트 비주얼은 최소화했습니다. -->
        <div class="gallery" aria-label="프로젝트 슬라이더">
          <ul class="cards">
            <li aria-label="프로젝트 카드 1"><img src="" alt="" /></li>
            <li aria-label="프로젝트 카드 2"><img src="" alt="" /></li>
            <li aria-label="프로젝트 카드 3"><img src="" alt="" /></li>
            <li aria-label="프로젝트 카드 4"><img src="" alt="" /></li>
            <li aria-label="프로젝트 카드 5"><img src="" alt="" /></li>
            <li aria-label="프로젝트 카드 6"><img src="" alt="" /></li>
            <li aria-label="프로젝트 카드 7"><img src="" alt="" /></li>
            <li aria-label="프로젝트 카드 8"><img src="" alt="" /></li>
            <li aria-label="프로젝트 카드 9"><img src="" alt="" /></li>
            <li aria-label="프로젝트 카드 10"><img src="" alt="" /></li>
          </ul>
          <div class="actions" aria-label="슬라이더 컨트롤">
            <button class="prev" type="button" aria-label="이전 슬라이드">❮</button>
            <button class="next" type="button" aria-label="다음 슬라이드">❯</button>
          </div>
        </div>
      </div>
      </section>
    </div>

    <section class="section section--about" id="about">
      <div class="inner">
        <p class="section__eyebrow">ABOUT</p>
      </div>
    </section>

    <section class="section section--contact" id="contact">
      <div class="inner">
        <p class="section__eyebrow">CONTACT</p>
      </div>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
